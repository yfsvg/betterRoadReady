<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="menuPage.css">
    <link rel="stylesheet" href="main.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
</head>


<body>
    <section id="mainBody">
        <h1 id="welcomeMessage">Welcome back, </h1>
        <p id="stateMessage">Your state is </p>

        <p id="currentDriveTimeDaylight">You currently have this many seconds of drive time in daytime: </p>
        <p id="currentDriveTimeNighttime">You currently have this many seconds of drive time in nighttime: </p>

        <select name="" id="kidSelection">
            <!-- Populated later -->
        </select>

        <button onclick="newKid()">Create a new kid profile</button>
        <div id="newKidInputPlace" style="display: none; flex-direction: column; gap: 5px;">
            <input type="text" placeholder="Kid first name" id="nkipF">
            <input type="text" placeholder="Kid last name" id="nkipL">
            <input type="number" placeholder="Kid age" id="nkipD">
            <button onclick="createdNewKid()">Confirm new kid creation</button>
        </div>

        <button onclick="deleteAccount()">Delete account</button>
        <button onclick="startDriving()" id="startDrivingButton">Start driving session (No kids tho can't do it)</button>

        <p>Migrating from Roadready? Upload PDF of previous driving logs to not lose time (Optional, RoadReady export)</p>
        <input type="file" id="roadReadyImport">

        <div id="drivingLogsContainer">
            <h2>Driving Logs</h2>
            <div id="drivingLogsList">No logs yet.</div>
        </div>



        <button onclick="logOut()">Log Out</button>
    </section>


    <div id="bottomBar">
        <!--Ideas for what to include in here: Changing kids, switching between: 1. previous logs 2. creating a new log 3. Account management-->
        <div id="bottomBarMainSection">
            <div id="bottomBarID">

            </div>


        </div>

        <div id="accountChanger">
            <div id="accountChangerImage"></div>
        </div>

    </div>

    <script src="https://www.gstatic.com/firebasejs/12.11.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/12.11.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore-compat.js"></script>

    <script>
        // Firebase config
        const firebaseConfig = {
            apiKey: "AIzaSyCHKhqm63ERxABXRC4prKo5y3l3AVsY2nE",
            authDomain: "mocigan-rready.firebaseapp.com",
            projectId: "mocigan-rready",
            storageBucket: "mocigan-rready.firebasestorage.app",
            messagingSenderId: "490613256817",
            appId: "1:490613256817:web:10b8ee8ad0cf49ea0861d0",
            measurementId: "G-LG7JZ0NGHD"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();


        let userData = null;
        // page setup
        auth.onAuthStateChanged(async (user) => {
            if (user) {
                try {
                    const userDocRef = db.collection("users").doc(user.uid);
                    const userDoc = await userDocRef.get();

                    if (userDoc.exists) {
                        userData = userDoc.data();
                        console.log("User data loaded:", userData);
                        const displayName = userData.name || user.displayName || "driver";
                        document.getElementById("welcomeMessage").textContent = `Welcome back, ${displayName}`;
                        document.getElementById("stateMessage").textContent = `You live in ${userData.state || "your state"}`;

                        
                        if (userData.kidsIndexInfo && userData.kidsIndexInfo.length > 0) {
                            for (let i = 0; i < userData.kidsIndexInfo.length; i++) {
                                const kidName = `${userData.kidsIndexInfo[i].firstName} ${userData.kidsIndexInfo[i].lastName}`;
                                document.getElementById("kidSelection").innerHTML += `<option value="${i}">${kidName}</option>`;
                            }
                

                            document.getElementById("startDrivingButton").textContent = "Start logging!"
                            document.getElementById("kidSelection").addEventListener("change", updateDriveTimeDisplay);
                            updateDriveTimeDisplay();
                        }

                        populateDrivingLogs();
                        
                    } else {
                        console.log("User dont exist!");
                    }
                } catch (error) {
                    console.error("Error fetching user data:", error);
                }
            } else {
                window.location = "/login.html";
                alert("YOU ARE NOT SIGNED IN!!!");
            }

        });
        // End of config

        // Delete account function
        async function deleteAccount() {
            // Sensitive here so add some stuff
            const user = auth.currentUser;
            if (!user) {
                alert("No user is currently signed in");
                return;
            }
            // todo later add warning
            // demolish EVERYTHING!!
            await db.collection("users").doc(user.uid).delete();
            await user.delete();
            alert("Your account has been deleted.");
            window.location = "/login.html";
        }


        // todo make ts work
        function startDriving() {
            const kidDrivingWith = document.getElementById("kidSelection").value;
            sessionStorage.setItem("selectedKidName", `${userData.kidsIndexInfo[kidDrivingWith].firstName} ${userData.kidsIndexInfo[kidDrivingWith].lastName}`);
            sessionStorage.setItem("selectedKidID", `${kidDrivingWith}`);


            window.location = "/countingTimePage.html";
        }


        function updateDriveTimeDisplay() {
            const kidIndex = document.getElementById("kidSelection").value;
            if (kidIndex !== null && kidIndex !== "") {
                const daytimeSeconds = (userData.kidsDriveTimeLogged && userData.kidsDriveTimeLogged[kidIndex] && userData.kidsDriveTimeLogged[kidIndex].daytimeHours) || 0;
                const nighttimeSeconds = (userData.kidsDriveTimeLogged && userData.kidsDriveTimeLogged[kidIndex] && userData.kidsDriveTimeLogged[kidIndex].nighttimeHours) || 0;
                document.getElementById("currentDriveTimeDaylight").textContent = `You currently have this many seconds of daytime drive time: ${daytimeSeconds}`;
                document.getElementById("currentDriveTimeNighttime").textContent = `You currently have this many seconds of nighttime drive time: ${nighttimeSeconds}`;
            }
            populateDrivingLogs();
        }

        function populateDrivingLogs() {
            const logsList = document.getElementById("drivingLogsList");
            const logs = Array.isArray(userData.drivingLogs) ? userData.drivingLogs : [];

            if (logs.length === 0) {
                logsList.innerHTML = "No logs yet.";
                return
            }

            logsList.innerHTML = logs.map((log, index) => {
                const notes = log["Extra notes"] ? log["Extra notes"] : "None";
                return `
                    <div class="logCard" id="drivingLog${index}">\n
                        <p>${index}\n<strong>Driver:</strong> ${log.Driver}</p>\n<p><strong>Duration:</strong> ${log.Duration} seconds</p>\n<p><strong>Miles:</strong> ${log.Miles}</p>\n<p><strong>Weather:</strong> ${log.Weather}</p>\n<p><strong>Road type:</strong> ${log["Road type"]}</p>\n<p><strong>Time of day:</strong> ${log["Time of day"]}</p>\n<p><strong>Extra notes:</strong> ${notes}</p>\n<button onclick="deleteLog(${index})">Delete</button></div>
                `;
                
            }).join("");
        }

        function deleteLog(index) {
            const log = userData.drivingLogs[index];
            const duration = log.Duration;
            const timeOfDay = log["Time of day"];
            const driverName = log.Driver;

            // Find the kidID based on the driver name
            let kidID = null;
            for (let i = 0; i < userData.kidsIndexInfo.length; i++) {
                const kidName = `${userData.kidsIndexInfo[i].firstName} ${userData.kidsIndexInfo[i].lastName}`;
                if (kidName === driverName) {
                    kidID = i;
                    break;
                }
            }

            if (kidID === null) {
                alert("Could not find the kid for this log.");
                return;
            }

            // Subtract the duration from the appropriate time total
            if (timeOfDay === "day") {
                userData.kidsDriveTimeLogged[kidID].daytimeHours -= duration;
            } else {
                userData.kidsDriveTimeLogged[kidID].nighttimeHours -= duration;
            }

            // Remove the log from the array
            userData.drivingLogs.splice(index, 1);

            // Update the database
            const user = auth.currentUser;
            db.collection("users").doc(user.uid).update({
                kidsDriveTimeLogged: userData.kidsDriveTimeLogged,
                drivingLogs: userData.drivingLogs
            }).then(() => {
                // Refresh the display
                populateDrivingLogs();
                updateDriveTimeDisplay();
            }).catch((error) => {
                console.error("Error updating database:", error);
                alert("Error deleting log: " + error.message);
            });
        }

        function logOut() {
            auth.signOut().then(() => {
                window.location = "/login.html";
            }).catch((error) => {
                console.error("Error signing out:", error);
            });
        }

        function newKid() {
            document.getElementById("newKidInputPlace").style.display = "flex";
        }
        async function createdNewKid() {
            if (!userData) {
                alert("User data not loaded yet. Please wait.");
                return;
            }

            const firstName = document.getElementById("nkipF").value.trim();
            const lastName = document.getElementById("nkipL").value.trim();
            const age = document.getElementById("nkipD").value.trim();

            if (!firstName || !lastName || !age) {
                alert("You're missing some fields")
                return
            }

            if (isNaN(age) || age < 0 || age > 120) {
                alert("Please enter a valid age");
                return;
            }

            try {

                userData.kidsIndexInfo.push({firstName, lastName, age: parseInt(age)});
                userData.kidsDriveTimeLogged.push({daytimeHours: 0, nighttimeHours: 0});

                const user = auth.currentUser;

                await db.collection("users").doc(user.uid).update({
                    kidsIndexInfo: userData.kidsIndexInfo,
                    kidsDriveTimeLogged: userData.kidsDriveTimeLogged
                });

                const newIndex = userData.kidsIndexInfo.length - 1;
                const kidName = `${firstName} ${lastName}`;
                document.getElementById("kidSelection").innerHTML += `<option value="${newIndex}">${kidName}</option>`;

                document.getElementById("nkipF").value = ""
                document.getElementById("nkipL").value = ""
                document.getElementById("nkipD").value = ""
                document.getElementById("newKidInputPlace").style.display = "none"
                updateDriveTimeDisplay();

                alert("New kid profile created successfully!");
            } catch (error) {
                console.error("Error creating new kid profile:", error)
                alert("Error creating new kid profile: " + error.message)
            }

        }
    
    
        document.getElementById("roadReadyImport").addEventListener("change", async function() {
            pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
            
            const file = document.getElementById('roadReadyImport').files[0];
            if (!file) return;
            const arrayBuffer = await file.arrayBuffer();
            const pdf = await pdfjsLib.getDocument(arrayBuffer).promise;
            let fullText = '';
            for (let i = 1; i <= pdf.numPages; i++) {
                const page = await pdf.getPage(i)
                const textContent = await page.getTextContent()
                const pageText = textContent.items.map(item => item.str).join(' ')
                fullText += pageText + '\n'
            }
            console.log("received")
            
            // Splitting dates
            const dateRegex = /(\d{2}\/\d{2}\/\d{4})/g;
            const parts = fullText.split(dateRegex);
            
            const logs = [];
            
            // Process pairs: [textBeforeDate, date, textAfterDate, nextDate, ...]
            for (let i = 1; i < parts.length; i += 2) {
                const date = parts[i];
                const logText = parts[i + 1] || ''
                
                const sections = logText.split("   ").map(s => s.trim()).filter(s => s)
                
                let dayNight = '';
                const cleanedSections = sections.filter(section => {
                    if (section.match(/^(Day|Night)$/)) {
                        dayNight = section;
                        return false;
                    }
                    return !section.match(/^(Date|Notes|Time|Duration|Weather|Road Type|Day\/Night)$/) && 
                        !section.includes("Notes");
                });
                
                logs.push({
                    dayNight: dayNight,
                    date: date,
                    data: cleanedSections
                });
            }
            
        const selectedKidIndex = document.getElementById("kidSelection").value;
        if (selectedKidIndex === "" || selectedKidIndex === null) {
            alert("Please select a kid to import logs for.");
            return;
        }
        const kidName = `${userData.kidsIndexInfo[selectedKidIndex].firstName} ${userData.kidsIndexInfo[selectedKidIndex].lastName}`;
        
        try {
            for (const log of logs) {
                const [startTime, durationStr, weather, roadType, notes] = log.data;
                const duration = parseInt(durationStr);
                if (isNaN(duration)) {
                    console.warn("Invalid duration:", durationStr);
                    continue;
                }
                const newLog = {
                    Driver: kidName,
                    dateOfDrive: log.date,
                    StartTime: startTime,
                    Duration: duration,
                    Miles: 0,
                    Weather: weather,
                    "Road type": roadType,
                    "Time of day": log.dayNight.toLowerCase() === "day" ? "day" : "night",
                    "Extra notes": notes || "None"
                };
                userData.drivingLogs.push(newLog);
                if (log.dayNight.toLowerCase() === "day") {
                    userData.kidsDriveTimeLogged[selectedKidIndex].daytimeHours += duration;
                } else {
                    userData.kidsDriveTimeLogged[selectedKidIndex].nighttimeHours += duration;
                }
            }
            // Update database
            const user = auth.currentUser;
            await db.collection("users").doc(user.uid).update({
                drivingLogs: userData.drivingLogs,
                kidsDriveTimeLogged: userData.kidsDriveTimeLogged
            });
            // Refresh display
            populateDrivingLogs();
            updateDriveTimeDisplay();
            alert("Logs imported successfully!");
        } catch (error) {
            console.error("Error importing logs:", error);
            alert("Error importing logs: " + error.message);
        }
    });

    
    </script>


    
</body>
</html>
